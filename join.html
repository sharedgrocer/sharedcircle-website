<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join a CoCart Group</title>
  <meta name="description" content="You've been invited to join a group on CoCart — the smart shared shopping and expense splitting app.">
  <meta name="theme-color" content="#050510">

  <!-- Open Graph -->
  <meta property="og:title" content="Join a CoCart Group">
  <meta property="og:description" content="You've been invited to join a group on CoCart. Tap to open the app or download it.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/og-image.png">

  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050510;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background gradient matching main site */
    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 80%; height: 80%;
      background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%; right: -20%;
      width: 70%; height: 70%;
      background: radial-gradient(ellipse, rgba(139,92,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      width: 100%;
      padding: 24px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      text-decoration: none;
      color: inherit;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { color: #fff; }
    .logo span {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card {
      background: rgba(30,41,59,0.6);
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(16px);
    }

    .invite-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .invite-icon svg {
      width: 28px; height: 28px;
      color: #818cf8;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .code-badge {
      display: inline-block;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #a5b4fc;
      margin-bottom: 32px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      margin-bottom: 12px;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-apple {
      background: #fff;
      color: #000;
      margin-bottom: 12px;
    }
    .btn-apple:hover { background: #f1f5f9; }

    .btn-google {
      background: rgba(248,250,252,0.08);
      border: 1px solid rgba(148,163,184,0.2);
      color: #f8fafc;
    }
    .btn-google:hover { background: rgba(248,250,252,0.12); }

    .btn svg { flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #475569;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(148,163,184,0.15);
    }

    .footer-text {
      margin-top: 28px;
      font-size: 13px;
      color: #64748b;
    }
    .footer-text a {
      color: #818cf8;
      text-decoration: none;
    }
    .footer-text a:hover { text-decoration: underline; }

    .loading-state {
      display: none;
      padding: 20px 0;
      color: #94a3b8;
      font-size: 14px;
    }
    .loading-state.active { display: block; }

    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
        </svg>
      </div>
      <span>CoCart</span>
    </a>

    <!-- Attempting to open app -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      Opening CoCart...
    </div>

    <!-- Main card -->
    <div class="card" id="mainCard">
      <div class="invite-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>

      <h1>You've been invited to a group</h1>
      <p class="subtitle">Someone invited you to shop together on CoCart — the shared shopping and expense splitting app.</p>

      <div class="code-badge" id="inviteCode">-----</div>

      <a href="#" class="btn btn-primary" id="openAppBtn">
        Open in CoCart
      </a>

      <div class="divider">or download the app</div>

      <a href="https://apps.apple.com/app/cocart-mobile/id6744076381" class="btn btn-apple">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download on the App Store
      </a>

      <a href="https://play.google.com/store/apps/details?id=com.cocart.mobile" class="btn btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302a1 1 0 0 1 0 1.38l-2.302 2.302L15.09 12l2.608-2.492zM5.864 2.658L16.8 9.991l-2.302 2.302L5.864 2.658z"/></svg>
        Get it on Google Play
      </a>
    </div>

    <p class="footer-text">
      <a href="/">Learn more about CoCart</a>
    </p>
  </div>

  <script>
    (function() {
      // Extract invite code from URL path: /join/ABC12
      var path = window.location.pathname;
      var match = path.match(/\/join\/([A-Z0-9]{5})$/i);
      var code = match ? match[1].toUpperCase() : null;

      if (!code) {
        document.getElementById('inviteCode').textContent = 'Invalid Link';
        document.getElementById('openAppBtn').style.display = 'none';
        return;
      }

      // Display invite code
      document.getElementById('inviteCode').textContent = code;

      // Set up "Open in CoCart" button
      var deepLink = 'cocart://join/' + code;
      var openBtn = document.getElementById('openAppBtn');
      openBtn.href = deepLink;

      // On mobile, try to open the app automatically via deep link
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        document.getElementById('loadingState').classList.add('active');
        document.getElementById('mainCard').style.display = 'none';

        // Attempt deep link redirect
        window.location.href = deepLink;

        // If still here after 1.5s, the app isn't installed — show download options
        setTimeout(function() {
          document.getElementById('loadingState').classList.remove('active');
          document.getElementById('mainCard').style.display = '';
        }, 1500);
      }
    })();
  </script>
</body>
</html>
