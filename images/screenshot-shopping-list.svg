<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone background -->
  <rect width="360" height="640" rx="24" fill="#f8fafc"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="48" rx="24" fill="url(#grad1)"/>
  <rect x="0" y="24" width="360" height="24" fill="url(#grad1)"/>
  <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="white">9:41</text>
  <rect x="290" y="24" width="20" height="10" rx="2" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <rect x="310" y="27" width="2" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="292" y="26" width="14" height="6" rx="1" fill="white"/>

  <!-- Header bar -->
  <rect x="0" y="48" width="360" height="64" fill="url(#grad1)"/>
  <circle cx="36" cy="80" r="18" fill="rgba(255,255,255,0.15)"/>
  <text x="29" y="86" font-size="18">🛒</text>
  <text x="64" y="75" font-family="-apple-system, sans-serif" font-size="17" font-weight="700" fill="white">Apartment Group</text>
  <text x="64" y="93" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">3 members · 5 items</text>
  <circle cx="300" cy="80" r="16" fill="rgba(255,255,255,0.15)"/>
  <text x="293" y="85" font-size="14">💬</text>
  <circle cx="336" cy="80" r="16" fill="rgba(255,255,255,0.2)"/>
  <line x1="330" y1="80" x2="342" y2="80" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="336" y1="74" x2="336" y2="86" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Magic Import banner -->
  <rect x="16" y="124" width="328" height="48" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="28" y="148" font-size="15">⚡</text>
  <text x="48" y="144" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#4f46e5">Magic Import</text>
  <text x="48" y="160" font-family="-apple-system, sans-serif" font-size="11" fill="#6366f1">Say a recipe &amp; we'll add all items</text>
  <rect x="276" y="136" width="56" height="26" rx="8" fill="url(#grad1)"/>
  <text x="288" y="153" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="white">Try it</text>

  <!-- Active trip banner -->
  <rect x="16" y="182" width="328" height="44" rx="12" fill="#ecfdf5" stroke="#d1fae5" stroke-width="1"/>
  <circle cx="36" cy="204" r="5" fill="#10b981"/>
  <circle cx="36" cy="204" r="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <text x="50" y="200" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#059669">Trip in progress</text>
  <text x="50" y="216" font-family="-apple-system, sans-serif" font-size="11" fill="#10b981">Whole Foods · 2 of 5 items done</text>

  <!-- Item 1 - checked -->
  <rect x="16" y="238" width="328" height="60" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="257" width="22" height="22" rx="7" fill="#10b981"/>
  <polyline points="36,269 40,273 48,263" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="268" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-decoration="line-through">Organic Milk</text>
  <text x="64" y="284" font-family="-apple-system, sans-serif" font-size="11" fill="#cbd5e1">1 gallon · Dairy</text>
  <text x="316" y="270" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="end">$4.99</text>

  <!-- Item 2 - checked -->
  <rect x="16" y="306" width="328" height="60" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="325" width="22" height="22" rx="7" fill="#10b981"/>
  <polyline points="36,337 40,341 48,331" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="336" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-decoration="line-through">Sourdough Bread</text>
  <text x="64" y="352" font-family="-apple-system, sans-serif" font-size="11" fill="#cbd5e1">Bakery · Added by Sarah</text>
  <text x="316" y="338" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="end">$5.49</text>

  <!-- Item 3 - unchecked, urgent -->
  <rect x="16" y="374" width="328" height="60" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="393" width="22" height="22" rx="7" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="64" y="404" font-family="-apple-system, sans-serif" font-size="15" font-weight="500" fill="#1e293b">Avocados (3)</text>
  <text x="64" y="420" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">Produce · Just now</text>
  <rect x="256" y="395" width="50" height="18" rx="9" fill="#fef2f2"/>
  <text x="266" y="407" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#ef4444">Urgent</text>
  <text x="316" y="420" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="end">$3.99</text>

  <!-- Item 4 - unchecked with price drop -->
  <rect x="16" y="442" width="328" height="60" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="461" width="22" height="22" rx="7" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="64" y="472" font-family="-apple-system, sans-serif" font-size="15" font-weight="500" fill="#1e293b">Chicken Breast</text>
  <text x="64" y="488" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">2 lbs, boneless · Meat</text>
  <text x="316" y="474" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="end">$8.99</text>
  <rect x="258" y="480" width="58" height="16" rx="8" fill="#ecfdf5"/>
  <text x="264" y="491" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#059669">↓ $1.50</text>

  <!-- Item 5 - unchecked with avatar -->
  <rect x="16" y="510" width="328" height="60" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="529" width="22" height="22" rx="7" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="64" y="540" font-family="-apple-system, sans-serif" font-size="15" font-weight="500" fill="#1e293b">Greek Yogurt</text>
  <text x="64" y="556" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">Added by Sarah · 5m ago</text>
  <text x="316" y="542" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="end">$6.49</text>
  <circle cx="320" cy="552" r="9" fill="#ec4899"/>
  <text x="320" y="556" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">S</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="584" width="360" height="56" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="608" font-size="16" text-anchor="middle">🏠</text>
  <text x="40" y="624" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Home</text>
  <rect x="80" y="592" width="48" height="36" rx="10" fill="#eef2ff"/>
  <text x="104" y="608" font-size="16" text-anchor="middle">📝</text>
  <text x="104" y="624" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#4f46e5" text-anchor="middle">List</text>
  <circle cx="180" cy="596" r="24" fill="url(#emeraldGrad)"/>
  <text x="180" y="601" font-size="18" text-anchor="middle">🛒</text>
  <text x="256" y="608" font-size="16" text-anchor="middle">💰</text>
  <text x="256" y="624" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Expenses</text>
  <text x="320" y="608" font-size="16" text-anchor="middle">⚙️</text>
  <text x="320" y="624" font-family="-apple-system, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Settings</text>
</svg>
