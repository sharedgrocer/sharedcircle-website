<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone background -->
  <rect width="360" height="640" rx="24" fill="#f8fafc"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="48" rx="24" fill="url(#emeraldGrad)"/>
  <rect x="0" y="24" width="360" height="24" fill="url(#emeraldGrad)"/>
  <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="white">9:41</text>
  <rect x="290" y="24" width="20" height="10" rx="2" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <rect x="310" y="27" width="2" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="292" y="26" width="14" height="6" rx="1" fill="white"/>

  <!-- Header -->
  <rect x="0" y="48" width="360" height="64" fill="url(#emeraldGrad)"/>
  <text x="24" y="77" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="white">Shopping Trip</text>
  <text x="24" y="97" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Whole Foods Market</text>
  <!-- Live badge -->
  <rect x="274" y="68" width="62" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="288" cy="80" r="4" fill="#fbbf24"/>
  <text x="296" y="84" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="white">LIVE</text>

  <!-- Progress card -->
  <rect x="16" y="124" width="328" height="90" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="32" y="150" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Trip Progress</text>
  <text x="328" y="150" font-family="-apple-system, sans-serif" font-size="12" font-weight="500" fill="#10b981" text-anchor="end">12 min</text>
  <!-- Progress bar -->
  <rect x="32" y="162" width="296" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="32" y="162" width="178" height="8" rx="4" fill="url(#emeraldGrad)"/>
  <!-- Stats row -->
  <text x="32" y="194" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">3 of 5 items</text>
  <text x="328" y="194" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="end">60% done</text>

  <!-- On My Way card -->
  <rect x="16" y="226" width="328" height="56" rx="14" fill="#ecfdf5" stroke="#d1fae5" stroke-width="1"/>
  <circle cx="42" cy="254" r="16" fill="#10b981"/>
  <text x="42" y="259" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">J</text>
  <text x="68" y="248" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#047857">Jamie is shopping</text>
  <text x="68" y="266" font-family="-apple-system, sans-serif" font-size="11" fill="#10b981">At store · Started 12 min ago</text>
  <text x="320" y="258" font-size="18" text-anchor="end">🛒</text>

  <!-- In Cart section -->
  <text x="24" y="310" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">IN CART (3)</text>

  <rect x="16" y="320" width="328" height="48" rx="12" fill="white" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="335" width="18" height="18" rx="5" fill="#10b981"/>
  <polyline points="35,344 38,348 44,340" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="349" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-decoration="line-through">Organic Milk</text>
  <text x="316" y="349" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="end">$4.99</text>

  <rect x="16" y="374" width="328" height="48" rx="12" fill="white" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="389" width="18" height="18" rx="5" fill="#10b981"/>
  <polyline points="35,398 38,402 44,394" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="403" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-decoration="line-through">Sourdough Bread</text>
  <text x="316" y="403" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="end">$5.49</text>

  <rect x="16" y="428" width="328" height="48" rx="12" fill="white" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="443" width="18" height="18" rx="5" fill="#10b981"/>
  <polyline points="35,452 38,456 44,448" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="457" font-family="-apple-system, sans-serif" font-size="14" fill="#94a3b8" text-decoration="line-through">Avocados (3)</text>
  <text x="316" y="457" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="end">$3.99</text>

  <!-- Remaining section -->
  <text x="24" y="502" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">REMAINING (2)</text>

  <rect x="16" y="512" width="328" height="48" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="30" y="527" width="18" height="18" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="541" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#1e293b">Chicken Breast</text>
  <text x="316" y="541" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155" text-anchor="end">$8.99</text>

  <!-- Bottom action bar -->
  <rect x="0" y="584" width="360" height="56" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="24" y="594" width="196" height="38" rx="12" fill="url(#emeraldGrad)"/>
  <text x="122" y="618" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Complete Trip</text>
  <rect x="232" y="594" width="104" height="38" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="250" y="617" font-size="14">📷</text>
  <text x="270" y="617" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#ea580c">Scan Bill</text>
</svg>
