<svg xmlns="http://www.w3.org/2000/svg" width="360" height="640" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone background -->
  <rect width="360" height="640" rx="24" fill="#f8fafc"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="48" rx="24" fill="url(#grad1)"/>
  <rect x="0" y="24" width="360" height="24" fill="url(#grad1)"/>
  <text x="24" y="32" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="white">9:41</text>
  <rect x="290" y="24" width="20" height="10" rx="2" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
  <rect x="310" y="27" width="2" height="4" rx="1" fill="rgba(255,255,255,0.8)"/>
  <rect x="292" y="26" width="14" height="6" rx="1" fill="white"/>

  <!-- Header -->
  <rect x="0" y="48" width="360" height="64" fill="url(#grad1)"/>
  <text x="24" y="77" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="white">Expenses</text>
  <text x="24" y="97" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Apartment Group · Feb 2026</text>
  <!-- Insights button -->
  <rect x="274" y="68" width="70" height="28" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="286" y="86" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="white">📊 Insights</text>

  <!-- Total spending card -->
  <rect x="16" y="124" width="328" height="96" rx="18" fill="url(#grad1)"/>
  <circle cx="310" cy="150" r="30" fill="rgba(255,255,255,0.06)"/>
  <circle cx="330" cy="190" r="20" fill="rgba(255,255,255,0.04)"/>
  <text x="32" y="150" font-family="-apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Total Group Spending</text>
  <text x="32" y="182" font-family="-apple-system, sans-serif" font-size="34" font-weight="800" fill="white">$156.42</text>
  <text x="32" y="204" font-family="-apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">3 members · 12 items · 2 trips</text>

  <!-- Who Owes What -->
  <text x="24" y="250" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">WHO OWES WHAT</text>

  <!-- Member 1: Jamie - gets money -->
  <rect x="16" y="262" width="328" height="64" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="44" cy="294" r="18" fill="#4f46e5"/>
  <text x="44" y="299" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">J</text>
  <text x="74" y="288" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Jamie (You)</text>
  <text x="74" y="306" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">Paid $89.50</text>
  <rect x="244" y="282" width="88" height="24" rx="8" fill="#ecfdf5"/>
  <text x="288" y="298" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">Gets $37.36</text>

  <!-- Member 2: Sarah - owes -->
  <rect x="16" y="334" width="328" height="64" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="44" cy="366" r="18" fill="#ec4899"/>
  <text x="44" y="371" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">S</text>
  <text x="74" y="360" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Sarah</text>
  <text x="74" y="378" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">Paid $42.50</text>
  <rect x="252" y="354" width="80" height="24" rx="8" fill="#fef2f2"/>
  <text x="292" y="370" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#dc2626" text-anchor="middle">Owes $9.64</text>

  <!-- Member 3: Alex - owes -->
  <rect x="16" y="406" width="328" height="64" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="44" cy="438" r="18" fill="#f97316"/>
  <text x="44" y="443" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">A</text>
  <text x="74" y="432" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Alex</text>
  <text x="74" y="450" font-family="-apple-system, sans-serif" font-size="11" fill="#94a3b8">Paid $24.42</text>
  <rect x="244" y="426" width="88" height="24" rx="8" fill="#fef2f2"/>
  <text x="288" y="442" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#dc2626" text-anchor="middle">Owes $27.72</text>

  <!-- Settlement Plan -->
  <text x="24" y="500" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">SETTLEMENT PLAN</text>

  <!-- Settlement 1: Sarah -> Jamie -->
  <rect x="16" y="512" width="328" height="48" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="38" cy="536" r="13" fill="#ec4899"/>
  <text x="38" y="540" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">S</text>
  <text x="58" y="540" font-family="-apple-system, sans-serif" font-size="14" fill="#93c5fd">→</text>
  <circle cx="76" cy="536" r="13" fill="#4f46e5"/>
  <text x="76" y="540" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">J</text>
  <text x="98" y="540" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="#1e293b">Sarah pays Jamie</text>
  <text x="328" y="540" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="end">$9.64</text>

  <!-- Settlement 2: Alex -> Jamie -->
  <rect x="16" y="568" width="328" height="48" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <circle cx="38" cy="592" r="13" fill="#f97316"/>
  <text x="38" y="596" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">A</text>
  <text x="58" y="596" font-family="-apple-system, sans-serif" font-size="14" fill="#93c5fd">→</text>
  <circle cx="76" cy="592" r="13" fill="#4f46e5"/>
  <text x="76" y="596" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">J</text>
  <text x="98" y="596" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="#1e293b">Alex pays Jamie</text>
  <text x="328" y="596" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="end">$27.72</text>
</svg>
